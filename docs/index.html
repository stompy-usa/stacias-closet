<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stacia's Closet</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:     #F5F0E8;
      --parchment: #EDE5D4;
      --ink:       #1A1612;
      --muted:     #7A6F63;
      --accent:    #8B3A2A;
      --border:    #D4C9B8;
      --card-bg:   #FDFAF5;
      --overlay:   rgba(26, 22, 18, 0.72);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Didact Gothic', sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.04em;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }
    @media (max-width: 600px) {
      header { padding: 0 16px; height: 52px; }
      .site-title { font-size: 22px; }
      .header-meta { display: none; }
    }

    .site-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .site-title img { width: 28px; height: 28px; object-fit: contain; }
    .site-title span { color: var(--accent); }

    .header-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Hero ── */
    .hero {
      border-bottom: 1px solid var(--border);
      padding: 48px 40px 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 300;
      line-height: 1.05;
      color: var(--ink);
    }

    .hero-headline em { font-style: italic; color: var(--accent); }

    .hero-sub {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      max-width: 460px;
      line-height: 1.7;
    }

    .stats-pill {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .stats-pill .count {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 300;
      line-height: 1;
      color: var(--ink);
    }

    .stats-pill .count-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stats-pill .last-update {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    @media (max-width: 600px) {
      .hero { padding: 24px 16px 20px; grid-template-columns: 1fr auto; gap: 12px; }
      .hero-sub { display: none; }
      .stats-pill .count { font-size: 36px; }
    }

    /* ── Toolbar ── */
    .toolbar {
      position: sticky;
      top: 68px;
      z-index: 90;
      background: var(--parchment);
      border-bottom: 1px solid var(--border);
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    @media (max-width: 600px) {
      .toolbar {
        top: 52px;
        padding: 8px 12px;
        gap: 6px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .toolbar::-webkit-scrollbar { display: none; }
      .toolbar-label { display: none; }
      .toolbar-sep { display: none; }
      .search-wrap { min-width: 130px; margin-left: 4px; }
      .search-input { width: 130px; }
      .filter-btn { font-size: 10px; padding: 5px 10px; white-space: nowrap; flex-shrink: 0; }
    }

    .toolbar-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
    .filter-btn.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }

    /* Favorites filter button — accent coloured when active */
    .filter-btn.fav-btn { border-color: var(--accent); color: var(--accent); display: flex; align-items: center; gap: 6px; }
    .filter-btn.fav-btn img { width: 14px; height: 14px; object-fit: contain; }
    .filter-btn.fav-btn.active { background: var(--accent); border-color: var(--accent); color: var(--cream); }
    .filter-btn.fav-btn.active img { filter: brightness(10); }

    .toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

    .search-wrap { margin-left: auto; position: relative; }

    .search-input {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 6px 32px 6px 12px;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--ink); }
    .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 13px; }

    /* ── Grid ── */
    .grid-container { padding: 40px; }
    @media (max-width: 600px) { .grid-container { padding: 12px 8px; } }

    .masonry-grid { columns: 4; column-gap: 16px; }
    @media (max-width: 1400px) { .masonry-grid { columns: 3; } }
    @media (max-width: 900px)  { .masonry-grid { columns: 2; } }
    @media (max-width: 600px)  { .masonry-grid { columns: 2; column-gap: 8px; } }
    @media (max-width: 400px)  { .masonry-grid { columns: 1; column-gap: 8px; } }

    /* ── Card ── */
    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: block;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s var(--ease-out), transform 0.5s var(--ease-out), box-shadow 0.3s var(--ease-out);
    }

    .card.visible { opacity: 1; transform: translateY(0); }
    .card:hover { box-shadow: 0 8px 32px rgba(26,22,18,0.12); z-index: 2; }
    .card:hover .card-img { transform: scale(1.04); }
    .card:hover .card-overlay { opacity: 1; }

    .card-img-wrap {
      overflow: hidden;
      background: var(--parchment);
      position: relative;
      aspect-ratio: 3 / 4;
    }

    .card-img-wrap.placeholder-wrap { aspect-ratio: 1 / 1; }

    .card-img {
      width: 100%;
      height: 100%;
      display: block;
      position: absolute;
      top: 0; left: 0;
      transition: transform 0.6s var(--ease-out);
      object-fit: cover;
    }

    /* ── Overlay ── */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s var(--ease-out);
      pointer-events: none;
    }

    .card-overlay-text {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      border: 1px solid rgba(245,240,232,0.5);
      padding: 8px 18px;
    }

    /* ── Favorite button (top-left of overlay) ── */
    .fav-btn-card {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 42px;
      height: 42px;
      background: rgba(26,22,18,0.55);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s var(--ease-out), transform 0.2s var(--ease-out), background 0.2s;
      pointer-events: none;
      z-index: 3;
    }

    .fav-btn-card img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.2s var(--ease-out);
    }

    .card:hover .fav-btn-card {
      opacity: 1;
      pointer-events: auto;
    }

    .fav-btn-card:hover {
      background: rgba(139,58,42,0.8);
      transform: scale(1.1);
    }

    .fav-btn-card:hover img { opacity: 1; }

    /* Favorited state — always visible, full cherry */
    .fav-btn-card.favorited {
      opacity: 1;
      pointer-events: auto;
      background: var(--accent);
    }

    .fav-btn-card.favorited img { opacity: 1; }

    /* ── Remove button (top-right, favorites view only) ── */
    .remove-btn-card {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      background: rgba(26,22,18,0.55);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--cream);
      font-size: 14px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.3s var(--ease-out), background 0.2s;
      pointer-events: none;
      z-index: 3;
    }

    .favorites-active .remove-btn-card { display: flex; }
    .card:hover .remove-btn-card { opacity: 1; pointer-events: auto; }
    .remove-btn-card:hover { background: rgba(139,58,42,0.9); }

    /* ── Card body ── */
    .card-body { padding: 14px 14px 16px; border-top: 1px solid var(--border); }

    .card-site {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .card-footer { display: flex; align-items: center; justify-content: space-between; }

    .card-price {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 300;
      color: var(--ink);
    }

    .card-category {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--parchment);
      border: 1px solid var(--border);
      padding: 3px 8px;
    }

    @media (max-width: 600px) {
      .card-body { padding: 8px 8px 10px; }
      .card-name { font-size: 13px; }
      .card-price { font-size: 13px; }
      .card-category { font-size: 8px; padding: 2px 5px; }
      .card-site { font-size: 8px; margin-bottom: 3px; }
      .fav-btn-card { width: 32px; height: 32px; }
      .fav-btn-card img { width: 18px; height: 18px; }
    }

    /* ── States ── */
    .state-msg { text-align: center; padding: 80px 20px; color: var(--muted); }
    .state-msg .big { font-family: var(--font-display); font-size: 48px; font-weight: 300; font-style: italic; margin-bottom: 12px; color: var(--border); }

    .loading-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin: 0 3px;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      footer { padding: 16px; flex-direction: column; gap: 4px; text-align: center; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <header>
    <a class="site-title" href="#">
      <img src="./favicon.png" alt="cherry" />
      Stacia's <span>Closet</span>
    </a>
    <span class="header-meta">Curated Vintage &amp; Contemporary</span>
  </header>

  <section class="hero">
    <div>
      <p class="hero-eyebrow">The Lookbook</p>
      <h1 class="hero-headline">Rare finds,<br><em>one place.</em></h1>
      <p class="hero-sub">
        Live inventory from Wayward Collection, Aritzia, and Abercrombie &amp; Fitch —
        refreshed regularly.
      </p>
    </div>
    <div class="stats-pill">
      <span class="count" id="stat-count">—</span>
      <span class="count-label">pieces</span>
      <span class="last-update" id="stat-updated"></span>
    </div>
  </section>

  <div class="toolbar" id="toolbar">
    <span class="toolbar-label">Filter</span>
    <button class="filter-btn active" id="all-sources-btn" data-filter-type="site" data-filter-value="">All Sources</button>
    <div class="toolbar-sep"></div>
    <div id="site-filters" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
    <div class="toolbar-sep"></div>
    <button class="filter-btn fav-btn" id="fav-filter-btn">
      <img src="./favicon.png" alt="cherry" />
      Favorites
    </button>
    <div class="search-wrap">
      <input class="search-input" type="text" id="search" placeholder="Search pieces…" />
      <span class="search-icon">⌕</span>
    </div>
  </div>

  <main class="grid-container">
    <div class="masonry-grid" id="grid">
      <div class="state-msg">
        <div class="big">Loading</div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
  </main>

  <footer>
    <span>Stacia's Closet</span>
    <span id="footer-count"></span>
    <span>Updated regularly</span>
  </footer>

  <script>
    const PROXY = 'https://stacias-closet.rcookson80.workers.dev/?url=';
    const SITE_LABELS = {
      wayward:     'Wayward Collection',
      aritzia:     'Aritzia',
      abercrombie: 'Abercrombie & Fitch',
    };
    const PLACEHOLDER_GIF = 'data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==';
    const FAV_KEY = 'stacias_closet_favorites';

    let allProducts    = [];
    let activeSite     = '';
    let activeCategory = '';
    let searchQuery    = '';
    let showFavorites  = false;

    // ── Favorites persistence ─────────────────────────────────────────
    function loadFavorites() {
      try { return JSON.parse(localStorage.getItem(FAV_KEY) || '{}'); }
      catch { return {}; }
    }

    function saveFavorites(favs) {
      localStorage.setItem(FAV_KEY, JSON.stringify(favs));
    }

    function isFavorited(product_url) {
      return !!loadFavorites()[product_url];
    }

    function toggleFavorite(product) {
      const favs = loadFavorites();
      if (favs[product.product_url]) {
        delete favs[product.product_url];
      } else {
        // Store full product snapshot so delisted items still show
        favs[product.product_url] = { ...product, favorited_at: new Date().toISOString() };
      }
      saveFavorites(favs);
      return !!favs[product.product_url];
    }

    function removeFavorite(product_url) {
      const favs = loadFavorites();
      delete favs[product_url];
      saveFavorites(favs);
    }

    function getFavoriteProducts() {
      return Object.values(loadFavorites()).sort((a, b) =>
        new Date(b.favorited_at) - new Date(a.favorited_at)
      );
    }

    // ── Boot ──────────────────────────────────────────────────────────
    async function init() {
      try {
        const resp = await fetch('./products.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        allProducts = await resp.json();
        // Shuffle so the grid shows in a different order each visit
        allProducts = allProducts.sort(() => Math.random() - 0.5);
        buildFilters();
        updateStats();
        renderGrid();
      } catch (err) {
        document.getElementById('grid').innerHTML = `
          <div class="state-msg">
            <div class="big">No data</div>
            <p>Run the scraper to generate products.json</p>
          </div>`;
      }

      // All Sources button — resets site filter
      document.getElementById('all-sources-btn').addEventListener('click', () => {
        activeSite     = '';
        activeCategory = '';
        showFavorites  = false;
        document.getElementById('fav-filter-btn').classList.remove('active');
        document.getElementById('grid').classList.remove('favorites-active');
        document.querySelectorAll('.filter-btn[data-filter-type="site"]')
          .forEach(b => b.classList.remove('active'));
        document.getElementById('all-sources-btn').classList.add('active');
        renderGrid();
      });

      // Favorites filter button
      document.getElementById('fav-filter-btn').addEventListener('click', () => {
        showFavorites = !showFavorites;
        document.getElementById('fav-filter-btn').classList.toggle('active', showFavorites);
        document.getElementById('grid').classList.toggle('favorites-active', showFavorites);
        // Clear other filters when entering favorites
        if (showFavorites) {
          activeSite     = '';
          activeCategory = '';
          searchQuery    = '';
          document.getElementById('search').value = '';
          document.querySelectorAll('.filter-btn[data-filter-type]')
            .forEach(b => b.classList.remove('active'));
          document.querySelector('.filter-btn[data-filter-value=""]')?.classList.add('active');
        }
        renderGrid();
      });
    }

    // ── Stats ─────────────────────────────────────────────────────────
    function updateStats() {
      document.getElementById('stat-count').textContent =
        allProducts.length.toLocaleString();
      const latest = allProducts.map(p => p.scraped_at).filter(Boolean).sort().pop();
      if (latest) {
        const d = new Date(latest);
        document.getElementById('stat-updated').textContent =
          'Updated ' + d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      }
    }

    // ── Filters ───────────────────────────────────────────────────────
    function buildFilters() {
      const sites = [...new Set(allProducts.map(p => p.site))].sort();

      const siteWrap = document.getElementById('site-filters');
      sites.forEach(s => siteWrap.appendChild(makeBtn(SITE_LABELS[s] || s, 'site', s)));


    }

    function makeBtn(label, type, value) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = label;
      btn.dataset.filterType  = type;
      btn.dataset.filterValue = value;
      btn.addEventListener('click', () => {
        showFavorites = false;
        document.getElementById('fav-filter-btn').classList.remove('active');
        document.getElementById('grid').classList.remove('favorites-active');

        // Toggle: clicking active site filter deselects it (returns to All Sources)
        if (type === 'site') activeSite = activeSite === value ? '' : value;

        // Update active state on all site buttons
        document.querySelectorAll('.filter-btn[data-filter-type="site"]')
          .forEach(b => b.classList.remove('active'));

        if (activeSite) {
          btn.classList.add('active');
          document.getElementById('all-sources-btn').classList.remove('active');
        } else {
          document.getElementById('all-sources-btn').classList.add('active');
        }

        renderGrid();
      });
      return btn;
    }

    // ── Search ────────────────────────────────────────────────────────
    let searchTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        showFavorites = false;
        document.getElementById('fav-filter-btn').classList.remove('active');
        document.getElementById('grid').classList.remove('favorites-active');
        searchQuery = e.target.value.toLowerCase().trim();
        renderGrid();
      }, 200);
    });

    // ── Render ────────────────────────────────────────────────────────
    function filtered() {
      if (showFavorites) return getFavoriteProducts();
      return allProducts.filter(p => {
        if (activeSite     && p.site     !== activeSite)     return false;
        if (activeCategory && p.category !== activeCategory) return false;
        if (searchQuery) {
          const hay = `${p.name} ${p.category} ${p.site}`.toLowerCase();
          if (!hay.includes(searchQuery)) return false;
        }
        return true;
      });
    }

    function renderGrid() {
      const grid     = document.getElementById('grid');
      const products = filtered();

      document.getElementById('footer-count').textContent =
        `${products.length.toLocaleString()} pieces showing`;

      if (!products.length) {
        grid.innerHTML = showFavorites
          ? `<div class="state-msg"><div class="big">No favorites yet</div><p>Hover a piece and tap the cherry to save it.</p></div>`
          : `<div class="state-msg"><div class="big">No results</div><p>Try adjusting your filters.</p></div>`;
        return;
      }

      grid.innerHTML = '';
      products.forEach((p, i) => grid.appendChild(buildCard(p, i)));

      // Reveal animation observer
      const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            revealObserver.unobserve(e.target);
          }
        });
      }, { threshold: 0.05 });

      // Image load/unload observer for memory efficiency
      const imgObserver = new IntersectionObserver(entries => {
        entries.forEach(e => {
          const img = e.target.querySelector('.card-img');
          if (!img) return;
          if (e.isIntersecting) {
            if (img.dataset.src && !img.src.includes(img.dataset.src.slice(-20)))
              img.src = img.dataset.src;
          } else {
            if (img.dataset.src) img.src = PLACEHOLDER_GIF;
          }
        });
      }, { rootMargin: '400px 0px 400px 0px', threshold: 0 });

      grid.querySelectorAll('.card').forEach(c => {
        revealObserver.observe(c);
        imgObserver.observe(c);
      });
    }

    // ── Card builder ──────────────────────────────────────────────────
    function buildCard(p, i) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href      = p.product_url || '#';
      a.target    = '_blank';
      a.rel       = 'noopener noreferrer';
      a.style.transitionDelay = `${Math.min(i * 30, 400)}ms`;

      const imgSrc = p.image_url && p.image_url.includes('img.abercrombie.com')
        ? PROXY + encodeURIComponent(p.image_url)
        : p.image_url;
      const isPlaceholder = !imgSrc || imgSrc.startsWith('data:') || imgSrc.includes('placeholder');
      const finalSrc = isPlaceholder ? './favicon.png' : imgSrc;
      const favorited = isFavorited(p.product_url);

      a.innerHTML = `
        <div class="card-img-wrap ${isPlaceholder ? 'placeholder-wrap' : ''}">
          <img class="card-img"
               src="${PLACEHOLDER_GIF}"
               data-src="${esc(finalSrc)}"
               alt="${esc(p.name)}"
               style="${isPlaceholder ? 'object-fit:contain;padding:40px;opacity:0.4;' : ''}" />
          <div class="card-overlay">
            <span class="card-overlay-text">View Piece →</span>
          </div>
          <button class="fav-btn-card ${favorited ? 'favorited' : ''}" title="${favorited ? 'Unfavorite' : 'Favorite'}">
            <img src="./favicon.png" alt="favorite" />
          </button>
          <button class="remove-btn-card" title="Remove from favorites">✕</button>
        </div>
        <div class="card-body">
          <p class="card-site">${esc(SITE_LABELS[p.site] || p.site)}</p>
          <p class="card-name">${esc(p.name)}</p>
          <div class="card-footer">
            <span class="card-price">${esc(p.price || '')}</span>
            <span class="card-category">${esc(p.category || '')}</span>
          </div>
        </div>`;

      // Favorite button — stop link propagation, toggle favorite
      const favBtn = a.querySelector('.fav-btn-card');
      favBtn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        const nowFav = toggleFavorite(p);
        favBtn.classList.toggle('favorited', nowFav);
        favBtn.title = nowFav ? 'Unfavorite' : 'Favorite';
        // If we're in favorites view and just unfavorited, remove the card
        if (showFavorites && !nowFav) {
          a.style.transition = 'opacity 0.3s';
          a.style.opacity = '0';
          setTimeout(() => { a.remove(); renderGrid(); }, 300);
        }
      });

      // Remove button (favorites view only) — top-right X
      const removeBtn = a.querySelector('.remove-btn-card');
      removeBtn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        removeFavorite(p.product_url);
        a.style.transition = 'opacity 0.3s';
        a.style.opacity = '0';
        setTimeout(() => { a.remove(); renderGrid(); }, 300);
      });

      return a;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
