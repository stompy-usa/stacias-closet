<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stacia's Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Didact+Gothic&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ─────────────────────────────────────────────────── */
    :root {
      --cream:      #F5F0E8;
      --parchment:  #EDE5D4;
      --ink:        #1A1612;
      --muted:      #7A6F63;
      --accent:     #8B3A2A;
      --accent-lt:  #C4614D;
      --border:     #D4C9B8;
      --card-bg:    #FDFAF5;
      --overlay:    rgba(26, 22, 18, 0.72);

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Didact Gothic', sans-serif;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Reset ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.04em;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grain overlay ──────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .site-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
    }

    .site-title span {
      color: var(--accent);
    }

    .header-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Hero strip ─────────────────────────────────────────────────── */
    .hero {
      border-bottom: 1px solid var(--border);
      padding: 48px 40px 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .hero-headline {
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 300;
      line-height: 1.05;
      color: var(--ink);
    }

    .hero-headline em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      max-width: 460px;
      line-height: 1.7;
    }

    .stats-pill {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .stats-pill .count {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 300;
      line-height: 1;
      color: var(--ink);
    }

    .stats-pill .count-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stats-pill .last-update {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────── */
    .toolbar {
      position: sticky;
      top: 68px;
      z-index: 90;
      background: var(--parchment);
      border-bottom: 1px solid var(--border);
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-input {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 6px 32px 6px 12px;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--ink); }

    .search-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 13px;
    }

    /* ── Grid ────────────────────────────────────────────────────────── */
    .grid-container {
      padding: 40px;
    }

    .masonry-grid {
      columns: 4;
      column-gap: 16px;
    }

    @media (max-width: 1400px) { .masonry-grid { columns: 3; } }
    @media (max-width: 900px)  { .masonry-grid { columns: 2; } }
    @media (max-width: 560px)  { .masonry-grid { columns: 1; } }

    /* ── Card ────────────────────────────────────────────────────────── */
    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: block;
      text-decoration: none;
      color: inherit;

      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 0.5s var(--ease-out),
        transform 0.5s var(--ease-out),
        box-shadow 0.3s var(--ease-out);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(26,22,18,0.12);
      z-index: 2;
    }

    .card:hover .card-img {
      transform: scale(1.04);
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    /* Image wrapper */
    .card-img-wrap {
      overflow: hidden;
      background: var(--parchment);
      position: relative;
    }

    .card-img {
      width: 100%;
      display: block;
      transition: transform 0.6s var(--ease-out);
      object-fit: cover;
    }

    /* Overlay on hover */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s var(--ease-out);
    }

    .card-overlay-text {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      border: 1px solid rgba(245,240,232,0.5);
      padding: 8px 18px;
    }

    /* Card body */
    .card-body {
      padding: 14px 14px 16px;
      border-top: 1px solid var(--border);
    }

    .card-site {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 300;
      color: var(--ink);
    }

    .card-category {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--parchment);
      border: 1px solid var(--border);
      padding: 3px 8px;
    }

    /* ── Empty / Loading states ─────────────────────────────────────── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .state-msg .big {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 300;
      font-style: italic;
      margin-bottom: 12px;
      color: var(--border);
    }

    .loading-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin: 0 3px;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <a class="site-title" href="#">Stacia's <span>Closet</span></a>
    <span class="header-meta">Curated Vintage &amp; Contemporary</span>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div>
      <p class="hero-eyebrow">The Lookbook</p>
      <h1 class="hero-headline">Rare finds,<br><em>one place.</em></h1>
      <p class="hero-sub">
        Live inventory from Wayward Collection, Aritzia, and Abercrombie &amp; Fitch —
        refreshed automatically every few hours.
      </p>
    </div>
    <div class="stats-pill">
      <span class="count" id="stat-count">—</span>
      <span class="count-label">pieces</span>
      <span class="last-update" id="stat-updated"></span>
    </div>
  </section>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-label">Filter</span>
    <button class="filter-btn active" data-filter-type="site" data-filter-value="">All Sources</button>
    <div class="toolbar-sep"></div>
    <div id="site-filters"></div>
    <div class="toolbar-sep"></div>
    <div id="category-filters"></div>
    <div class="search-wrap">
      <input class="search-input" type="text" id="search" placeholder="Search pieces…" />
      <span class="search-icon">⌕</span>
    </div>
  </div>

  <!-- Grid -->
  <main class="grid-container">
    <div class="masonry-grid" id="grid">
      <div class="state-msg">
        <div class="big">Loading</div>
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <span>Stacia's Closet &mdash; Lookbook</span>
    <span id="footer-count"></span>
    <span>Data refreshes every 2 hrs</span>
  </footer>

  <script>
    const API = 'http://localhost:5050';

    // ── State ──────────────────────────────────────────────────────────
    let allProducts   = [];
    let activeSite    = '';
    let activeCategory = '';
    let searchQuery   = '';

    // ── Fetch & bootstrap ──────────────────────────────────────────────
    async function init() {
      try {
        const [productsRes, filtersRes, statsRes] = await Promise.all([
          fetch(`${API}/api/products`),
          fetch(`${API}/api/filters`),
          fetch(`${API}/api/stats`),
        ]);

        allProducts = await productsRes.json();
        const filters = await filtersRes.json();
        const stats   = await statsRes.json();

        buildFilterButtons(filters);
        updateStats(stats);
        renderGrid();
      } catch (err) {
        document.getElementById('grid').innerHTML = `
          <div class="state-msg">
            <div class="big">Offline</div>
            <p>Start the API server: <code>python api.py</code></p>
          </div>`;
      }
    }

    // ── Stats bar ──────────────────────────────────────────────────────
    function updateStats(stats) {
      document.getElementById('stat-count').textContent =
        stats.total_products?.toLocaleString() ?? '—';

      if (stats.last_scraped) {
        const d = new Date(stats.last_scraped);
        document.getElementById('stat-updated').textContent =
          'Updated ' + d.toLocaleString('en-US', {
            month: 'short', day: 'numeric',
            hour: 'numeric', minute: '2-digit'
          });
      }
    }

    // ── Filter buttons ─────────────────────────────────────────────────
    const SITE_LABELS = {
      wayward:     'Wayward Collection',
      aritzia:     'Aritzia',
      abercrombie: 'Abercrombie & Fitch',
    };

    function buildFilterButtons({ sites, categories }) {
      const siteWrap = document.getElementById('site-filters');
      sites.forEach(s => {
        const btn = makeFilterBtn(SITE_LABELS[s] || s, 'site', s);
        siteWrap.appendChild(btn);
      });

      const catWrap = document.getElementById('category-filters');
      categories.slice(0, 8).forEach(c => {  // cap at 8 to avoid toolbar overflow
        const btn = makeFilterBtn(c, 'category', c);
        catWrap.appendChild(btn);
      });
    }

    function makeFilterBtn(label, type, value) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = label;
      btn.dataset.filterType  = type;
      btn.dataset.filterValue = value;
      btn.addEventListener('click', () => onFilterClick(btn, type, value));
      return btn;
    }

    function onFilterClick(btn, type, value) {
      if (type === 'site') {
        activeSite = activeSite === value ? '' : value;
      } else {
        activeCategory = activeCategory === value ? '' : value;
      }

      // Update active state on buttons of same type
      document.querySelectorAll(`.filter-btn[data-filter-type="${type}"]`)
        .forEach(b => b.classList.toggle('active',
          b === btn && (type === 'site' ? activeSite : activeCategory) !== ''));

      // Keep "All Sources" active when no site selected
      if (type === 'site' && !activeSite) {
        document.querySelector('.filter-btn[data-filter-value=""]')
          ?.classList.add('active');
      }

      renderGrid();
    }

    // ── Search ─────────────────────────────────────────────────────────
    let searchTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderGrid();
      }, 200);
    });

    // ── Render ─────────────────────────────────────────────────────────
    function filteredProducts() {
      return allProducts.filter(p => {
        if (activeSite     && p.site     !== activeSite)     return false;
        if (activeCategory && p.category !== activeCategory) return false;
        if (searchQuery) {
          const hay = `${p.name} ${p.category} ${p.site}`.toLowerCase();
          if (!hay.includes(searchQuery)) return false;
        }
        return true;
      });
    }

    function renderGrid() {
      const grid    = document.getElementById('grid');
      const products = filteredProducts();

      document.getElementById('footer-count').textContent =
        `${products.length.toLocaleString()} pieces showing`;

      if (!products.length) {
        grid.innerHTML = `
          <div class="state-msg">
            <div class="big">No results</div>
            <p>Try adjusting your filters.</p>
          </div>`;
        return;
      }

      grid.innerHTML = '';
      products.forEach((p, i) => {
        const card = buildCard(p, i);
        grid.appendChild(card);
      });

      // Staggered reveal via IntersectionObserver
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.05 });

      grid.querySelectorAll('.card').forEach(card => observer.observe(card));
    }

    // ── Card builder ───────────────────────────────────────────────────
    function buildCard(p, index) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href      = p.product_url || '#';
      a.target    = '_blank';
      a.rel       = 'noopener noreferrer';
      a.style.transitionDelay = `${Math.min(index * 30, 400)}ms`;

      const imgSrc = p.image_url || '';
      const hasImg = imgSrc && !imgSrc.includes('placeholder');

      a.innerHTML = `
        <div class="card-img-wrap">
          ${hasImg
            ? `<img class="card-img" src="${escHtml(imgSrc)}"
                    alt="${escHtml(p.name)}"
                    loading="lazy"
                    onerror="this.parentElement.style.minHeight='160px'" />`
            : `<div style="min-height:200px;background:var(--parchment);"></div>`
          }
          <div class="card-overlay">
            <span class="card-overlay-text">View Piece →</span>
          </div>
        </div>
        <div class="card-body">
          <p class="card-site">${escHtml(SITE_LABELS[p.site] || p.site)}</p>
          <p class="card-name">${escHtml(p.name)}</p>
          <div class="card-footer">
            <span class="card-price">${escHtml(p.price || '')}</span>
            <span class="card-category">${escHtml(p.category || '')}</span>
          </div>
        </div>`;

      return a;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Boot ───────────────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
